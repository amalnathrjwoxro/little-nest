name: Deploy to AWS EB

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build
        run: npm run build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}

      - name: Copy static files for standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Zip
        run: |
          zip -r app.zip \
            .next/standalone \
            Procfile \
            --exclude ".next/standalone/.env"

      - name: Wait for EB Environment to be Ready
        run: |
          for i in {1..60}; do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name little-nest \
              --environment-names Little-nest-env \
              --region eu-north-1 \
              --query 'Environments[0].Status' \
              --output text)
            echo "Environment status: $STATUS"
            if [ "$STATUS" = "Ready" ]; then
              echo "Environment is ready for deployment"
              exit 0
            fi
            echo "Waiting... (attempt $i/60)"
            sleep 15
          done
          exit 1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: little-nest
          environment_name: Little-nest-env
          region: eu-north-1
          version_label: ${{ github.sha }}
          deployment_package: app.zip
          wait_for_environment_recovery: true
          use_existing_version_if_available: true

      - name: Fetch EB Logs on Failure
        if: failure()
        run: |
          aws elasticbeanstalk request-environment-info \
            --environment-name Little-nest-env \
            --info-type tail \
            --region eu-north-1
          sleep 20
          aws elasticbeanstalk retrieve-environment-info \
            --environment-name Little-nest-env \
            --info-type tail \
            --region eu-north-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}